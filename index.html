<style>
body {
  font-family: Arial;
  text-align: center;
  background: #f5f5f5;
}

h1 {
  color: #2c3e50;
}

select, button, input {
  padding: 10px;
  margin: 10px;
  width: 200px;
}

button {
  background: #27ae60;
  color: white;
  border: none;
  cursor: pointer;
} 
</style>
<h1>GERAYO - Book Bus Tickets</h1>

<select id="from">
  <option>Kigali</option>
</select>

<select id="to">
  <option>Huye</option>
  <option>Musanze</option>
</select>

<button onclick="search()">Search</button>

<script>
function search() {
  const from = document.getElementById("from").value;
  const to = document.getElementById("to").value;

  window.location.href = `results.html?from=${from}&to=${to}`;
}
</script>
