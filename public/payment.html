<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gerayo | Secure MoMo Payment</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #27ae60;
            --momo-yellow: #ffcc00;
            --dark: #0f172a;
            --bg: #f8fafc;
            --border: #e2e8f0;
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--bg);
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }

        .payment-card {
            background: white;
            width: 100%;
            max-width: 420px;
            padding: 40px;
            border-radius: 28px;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.08);
            text-align: center;
            border: 1px solid var(--border);
        }

        .header h2 { color: var(--dark); margin: 0 0 8px 0; font-weight: 800; }
        .header p { color: #64748b; font-size: 0.9rem; margin-bottom: 30px; }

        .price-box {
            background: #f1f5f9;
            padding: 24px;
            border-radius: 20px;
            margin-bottom: 25px;
        }

        .price-label { font-size: 0.75rem; color: #64748b; text-transform: uppercase; font-weight: 700; letter-spacing: 1px; }
        .price-amount { font-size: 2rem; font-weight: 800; color: var(--primary); display: block; margin-top: 4px; }

        .input-group { text-align: left; margin-bottom: 24px; }
        label { display: block; font-size: 0.8rem; font-weight: 700; color: var(--dark); margin-bottom: 8px; }
        
        input {
            width: 100%;
            padding: 16px;
            border: 2px solid var(--border);
            border-radius: 14px;
            font-size: 1.1rem;
            font-weight: 600;
            box-sizing: border-box;
            transition: all 0.2s;
        }

        input:focus {
            outline: none;
            border-color: var(--momo-yellow);
            box-shadow: 0 0 0 4px rgba(255, 204, 0, 0.15);
        }

        .pay-btn {
            width: 100%;
            background: var(--dark);
            color: white;
            border: none;
            padding: 18px;
            border-radius: 16px;
            font-size: 1rem;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.3s;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 10px;
        }

        .pay-btn:hover { background: #000; transform: translateY(-2px); }
        .pay-btn:disabled { background: #cbd5e1; cursor: not-allowed; transform: none; }

        .loader {
            display: none;
            border: 3px solid rgba(255,255,255,0.3);
            border-top: 3px solid white;
            border-radius: 50%;
            width: 18px;
            height: 18px;
            animation: spin 0.8s linear infinite;
        }

        @keyframes spin { 100% { transform: rotate(360deg); } }

        .momo-badge {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            background: #fff9db;
            color: #856404;
            padding: 6px 12px;
            border-radius: 8px;
            font-size: 0.75rem;
            font-weight: 700;
            margin-bottom: 20px;
        }
    </style>
</head>
<body>

<div class="payment-card">
    <div class="momo-badge">🟡 MTN & Airtel Money Secure</div>
    
    <div class="header">
        <h2>Finish Booking</h2>
        <p>Reference: <span id="ref-id" style="font-weight:700; color:var(--dark)">...</span></p>
    </div>

    <div class="price-box">
        <span class="price-label">Amount Due</span>
        <span class="price-amount" id="price-display">0 RWF</span>
    </div>

    <div class="input-group">
        <label>Mobile Money Number</label>
        <input type="tel" id="momo-phone" placeholder="078 XXX XXXX">
    </div>

    <button class="pay-btn" onclick="processPayment()" id="payBtn">
        <span id="btnText">Authorize Payment</span>
        <div class="loader" id="loader"></div>
    </button>

    <p id="status-msg" style="margin-top: 20px; font-size: 0.85rem; color: #64748b;"></p>
</div>

<script>
    const params = new URLSearchParams(window.location.search);
    const bookingId = params.get("bookingId");
    let currentCompanyId = null;

    async function loadBookingDetails() {
        if (!bookingId) return window.location.href = 'index.html';
        
        document.getElementById("ref-id").innerText = `#${bookingId}`;

        try {
            const res = await fetch(`/api/ticket/${bookingId}`);
            const data = await res.json();
            
            if (data.price) {
                document.getElementById("price-display").innerText = `${Number(data.price).toLocaleString()} RWF`;
                currentCompanyId = data.company_id; 
            }
        } catch (e) { 
            console.error("Fetch error:", e); 
        }
    }

    loadBookingDetails();

    async function processPayment() {
        const phone = document.getElementById("momo-phone").value.replace(/\s/g, '');
        const btnText = document.getElementById("btnText");
        const loader = document.getElementById("loader");
        const payBtn = document.getElementById("payBtn");
        const statusMsg = document.getElementById("status-msg");

        if (!/^07[2389]\d{7}$/.test(phone)) {
            alert("Invalid number. Please use 078, 079, 072, or 073.");
            return;
        }

        btnText.innerText = "Checking Phone...";
        loader.style.display = "block";
        payBtn.disabled = true;

        // Stage 1: Handshake
        setTimeout(() => { statusMsg.innerText = "Check your phone for the MoMo PIN prompt..."; }, 1500);

        // Stage 2: Finalize
        try {
            const res = await fetch("/api/pay", {
                method: "POST",
                headers: {"Content-Type":"application/json"},
                body: JSON.stringify({ 
                    bookingId: bookingId, 
                    company_id: currentCompanyId 
                })
            });

            if (!res.ok) throw new Error("Transaction timed out or declined.");

            // Success Delay for effect
            setTimeout(() => {
                window.location.href = `ticket.html?id=${bookingId}`;
            }, 2000);

        } catch (err) {
            alert(err.message);
            btnText.innerText = "Authorize Payment";
            loader.style.display = "none";
            payBtn.disabled = false;
            statusMsg.innerText = "";
        }
    }
</script>

</body>
</html>
