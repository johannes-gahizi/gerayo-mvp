<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gerayo - Secure Payment</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #27ae60;
            --momo: #ffcc00; /* MTN Yellow */
            --dark: #1e293b;
            --bg: #f8fafc;
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--bg);
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        .payment-card {
            background: white;
            width: 100%;
            max-width: 400px;
            padding: 40px;
            border-radius: 24px;
            box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.1);
            text-align: center;
        }

        .header h2 { color: var(--dark); margin-bottom: 8px; }
        .header p { color: #64748b; font-size: 14px; margin-bottom: 30px; }

        .price-box {
            background: #f1f5f9;
            padding: 20px;
            border-radius: 16px;
            margin-bottom: 25px;
        }

        .price-label { font-size: 12px; color: #64748b; text-transform: uppercase; letter-spacing: 1px; }
        .price-amount { font-size: 32px; font-weight: 700; color: var(--primary); display: block; }

        .method-selector {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
            margin-bottom: 30px;
        }

        .method {
            border: 2px solid #e2e8f0;
            padding: 15px;
            border-radius: 12px;
            cursor: pointer;
            transition: all 0.3s;
            font-size: 14px;
            font-weight: 600;
        }

        .method.active {
            border-color: var(--primary);
            background: #f0fdf4;
            color: var(--primary);
        }

        .pay-btn {
            width: 100%;
            background: var(--primary);
            color: white;
            border: none;
            padding: 16px;
            border-radius: 12px;
            font-size: 16px;
            font-weight: 700;
            cursor: pointer;
            transition: transform 0.2s;
        }

        .pay-btn:active { transform: scale(0.98); }

        .loader {
            display: none;
            border: 3px solid #f3f3f3;
            border-top: 3px solid var(--primary);
            border-radius: 50%;
            width: 20px;
            height: 20px;
            animation: spin 1s linear infinite;
            margin: 0 auto;
        }

        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body>

<div class="payment-card">
    <div class="header">
        <h2>Checkout</h2>
        <p>Complete your booking for Reference #<span id="ref-id">...</span></p>
    </div>

    <div class="price-box">
        <span class="price-label">Total to Pay</span>
        <span class="price-amount">... RWF</span>
    </div>

    <div class="method-selector">
        <div class="method active" onclick="selectMethod(this)">Mobile Money</div>
        <div class="method" onclick="selectMethod(this)">Card</div>
    </div>

    <button class="pay-btn" onclick="processPayment()" id="payBtn">
        <span id="btnText">Pay Securely</span>
        <div class="loader" id="loader"></div>
    </button>
</div>
<script>
    const params = new URLSearchParams(window.location.search);
    const bookingId = params.get("bookingId");
    
    // We fetch the company_id from the URL or the loaded data later
    let currentCompanyId = null;

    async function loadBookingDetails() {
        if (!bookingId) {
            alert("Missing Booking ID");
            window.location.href = 'index.html';
            return;
        }
        document.getElementById("ref-id").innerText = bookingId;

        try {
            // ✅ FIX: This now works because we added the route to server.js
            const res = await fetch(`/api/ticket/${bookingId}`);
            const data = await res.json();
            
            if (data.price) {
                document.getElementById("price-display").innerText = `${data.price} RWF`;
                // Store the company_id returned from the database
                currentCompanyId = data.company_id; 
            }
        } catch (e) { 
            console.error("Could not fetch booking details"); 
        }
    }

    loadBookingDetails();

    async function processPayment() {
        const phone = document.getElementById("momo-phone").value;
        const btnText = document.getElementById("btnText");
        const loader = document.getElementById("loader");
        const payBtn = document.getElementById("payBtn");

        // ✅ FIX: Strong Rwanda Phone Validation
        if (!/^07[2389]\d{7}$/.test(phone)) {
            alert("Please enter a valid Rwanda MoMo number (078/079/072/073 followed by 7 digits)");
            return;
        }

        btnText.style.display = "none";
        loader.style.display = "block";
        payBtn.disabled = true;

        // Simulate network delay for MoMo handshake
        await new Promise(resolve => setTimeout(resolve, 3000));

        try {
            // ✅ FIX: Sending both bookingId AND company_id
            const res = await fetch("/api/pay", {
                method: "POST",
                headers: {"Content-Type":"application/json"},
                body: JSON.stringify({ 
                    bookingId: bookingId, 
                    company_id: currentCompanyId 
                })
            });

            if (!res.ok) throw new Error("Payment failed");

            window.location.href = `ticket.html?id=${bookingId}`;

        } catch (err) {
            alert("Error: " + err.message);
            btnText.style.display = "block";
            loader.style.display = "none";
            payBtn.disabled = false;
        }
    }
</script>

</body>
</html>
