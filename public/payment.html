<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gerayo | Secure Payment</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #27ae60;
            --primary-dark: #219150;
            --momo-yellow: #ffcc00;
            --bg: #f8fafc;
            --white: #ffffff;
            --text: #1e293b;
            --text-light: #64748b;
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--bg);
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            color: var(--text);
        }

        .payment-container {
            background: var(--white);
            width: 100%;
            max-width: 400px;
            padding: 40px;
            border-radius: 24px;
            box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.1);
            text-align: center;
        }

        .momo-logo {
            width: 60px;
            height: 60px;
            background: var(--momo-yellow);
            border-radius: 12px;
            margin: 0 auto 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 800;
            font-size: 1.2rem;
            box-shadow: 0 4px 10px rgba(255, 204, 0, 0.3);
        }

        h2 {
            margin: 0 0 10px;
            font-size: 1.5rem;
            font-weight: 700;
        }

        p {
            color: var(--text-light);
            font-size: 0.95rem;
            margin-bottom: 30px;
        }

        .input-group {
            text-align: left;
            margin-bottom: 25px;
        }

        label {
            display: block;
            font-size: 0.85rem;
            font-weight: 600;
            margin-bottom: 8px;
            color: var(--text);
        }

        input {
            width: 100%;
            padding: 14px 16px;
            border: 2px solid #e2e8f0;
            border-radius: 12px;
            font-size: 1rem;
            box-sizing: border-box;
            transition: all 0.2s;
        }

        input:focus {
            outline: none;
            border-color: var(--primary);
            box-shadow: 0 0 0 4px rgba(39, 174, 96, 0.1);
        }

        .btn-pay {
            width: 100%;
            background: var(--primary);
            color: white;
            border: none;
            padding: 16px;
            border-radius: 14px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 10px;
        }

        .btn-pay:hover {
            background: var(--primary-dark);
            transform: translateY(-2px);
        }

        .btn-pay:disabled {
            background: #cbd5e1;
            cursor: not-allowed;
            transform: none;
        }

        /* Loading Spinner */
        .spinner {
            width: 20px;
            height: 20px;
            border: 3px solid rgba(255,255,255,0.3);
            border-radius: 50%;
            border-top-color: #fff;
            animation: spin 0.8s linear infinite;
            display: none;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        .footer-note {
            margin-top: 25px;
            font-size: 0.8rem;
            color: var(--text-light);
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 6px;
        }
    </style>
</head>
<body>

<div class="payment-container">
    <div class="momo-logo">MoMo</div>
    <h2>Complete Payment</h2>
    <p>Please enter your Mobile Money number to authorize the transaction.</p>

    <div class="input-group">
        <label for="phone">MTN or Airtel Number</label>
        <input type="tel" id="phone" placeholder="078 / 079 / 072 / 073..." maxlength="10">
    </div>

    <button id="payBtn" class="btn-pay" onclick="pay()">
        <span id="btnText">Pay Now</span>
        <div id="loader" class="spinner"></div>
    </button>

    <div class="footer-note">
        🛡️ Secure Payment Gateway for Gerayo
    </div>
</div>

<script>
const params = new URLSearchParams(window.location.search);
const bookingId = params.get("bookingId");

function pay() {
    const phone = document.getElementById("phone").value.trim();
    const btn = document.getElementById("payBtn");
    const loader = document.getElementById("loader");
    const btnText = document.getElementById("btnText");

    if (phone.length < 10) {
        alert("Please enter a valid 10-digit phone number");
        return;
    }

    // UI Feedback
    btn.disabled = true;
    loader.style.display = "block";
    btnText.innerText = "Check your phone...";

    // Simulated "Payment Request" Delay
    setTimeout(() => {
        fetch("/api/pay", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ bookingId })
        })
        .then(res => {
            if (!res.ok) throw new Error("Payment API failed");
            return res.json();
        })
        .then(() => {
            // Success redirect to ticket
            window.location.href = `ticket.html?id=${bookingId}`;
        })
        .catch(err => {
            console.error(err);
            alert("Payment failed. Please try again.");
            btn.disabled = false;
            loader.style.display = "none";
            btnText.innerText = "Pay Now";
        });
    }, 3000); // 3-second simulation for MoMo push notification
}
</script>

</body>
</html>
