<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gerayo - Secure Payment</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #27ae60;
            --momo: #ffcc00; /* MTN Yellow */
            --dark: #1e293b;
            --bg: #f8fafc;
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--bg);
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        .payment-card {
            background: white;
            width: 100%;
            max-width: 400px;
            padding: 40px;
            border-radius: 24px;
            box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.1);
            text-align: center;
        }

        .header h2 { color: var(--dark); margin-bottom: 8px; }
        .header p { color: #64748b; font-size: 14px; margin-bottom: 30px; }

        .price-box {
            background: #f1f5f9;
            padding: 20px;
            border-radius: 16px;
            margin-bottom: 25px;
        }

        .price-label { font-size: 12px; color: #64748b; text-transform: uppercase; letter-spacing: 1px; }
        .price-amount { font-size: 32px; font-weight: 700; color: var(--primary); display: block; }

        .method-selector {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
            margin-bottom: 30px;
        }

        .method {
            border: 2px solid #e2e8f0;
            padding: 15px;
            border-radius: 12px;
            cursor: pointer;
            transition: all 0.3s;
            font-size: 14px;
            font-weight: 600;
        }

        .method.active {
            border-color: var(--primary);
            background: #f0fdf4;
            color: var(--primary);
        }

        .pay-btn {
            width: 100%;
            background: var(--primary);
            color: white;
            border: none;
            padding: 16px;
            border-radius: 12px;
            font-size: 16px;
            font-weight: 700;
            cursor: pointer;
            transition: transform 0.2s;
        }

        .pay-btn:active { transform: scale(0.98); }

        .loader {
            display: none;
            border: 3px solid #f3f3f3;
            border-top: 3px solid var(--primary);
            border-radius: 50%;
            width: 20px;
            height: 20px;
            animation: spin 1s linear infinite;
            margin: 0 auto;
        }

        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body>

<div class="payment-card">
    <div class="header">
        <h2>Checkout</h2>
        <p>Complete your booking for Reference #<span id="ref-id">...</span></p>
    </div>

    <div class="price-box">
        <span class="price-label">Total to Pay</span>
        <span class="price-amount">... RWF</span>
    </div>

    <div class="method-selector">
        <div class="method active" onclick="selectMethod(this)">Mobile Money</div>
        <div class="method" onclick="selectMethod(this)">Card</div>
    </div>

    <button class="pay-btn" onclick="processPayment()" id="payBtn">
        <span id="btnText">Pay Securely</span>
        <div class="loader" id="loader"></div>
    </button>
</div>

<script>
    const params = new URLSearchParams(window.location.search);
    const bookingId = params.get("bookingId");
    const company_id = params.get("company_id");

    // Display the reference ID
    document.getElementById("ref-id").innerText = bookingId;

    // Optional: Fetch actual price from your API to show here
    // For now, we'll keep it simple.

    function selectMethod(el) {
        document.querySelectorAll('.method').forEach(m => m.classList.remove('active'));
        el.classList.add('active');
    }

    function processPayment() {
        const btnText = document.getElementById("btnText");
        const loader = document.getElementById("loader");
        const payBtn = document.getElementById("payBtn");

        // UI Loading state
        btnText.style.display = "none";
        loader.style.display = "block";
        payBtn.disabled = true;

        // Call the Payment API we built in server.js
        fetch("/api/pay", {
            method: "POST",
            headers: {"Content-Type":"application/json"},
            body: JSON.stringify({ bookingId, company_id })
        })
        .then(res => {
            if (!res.ok) throw new Error("Payment failed");
            return res.json();
        })
        .then(() => {
            // Success! Send to ticket
            window.location.href = `ticket.html?id=${bookingId}`;
        })
        .catch(err => {
            alert("Error: " + err.message);
            btnText.style.display = "block";
            loader.style.display = "none";
            payBtn.disabled = false;
        });
    }
</script>

</body>
</html>
