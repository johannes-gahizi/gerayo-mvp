<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gerayo - Confirm Booking</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #27ae60;
            --primary-dark: #219150;
            --text-dark: #2c3e50;
            --text-light: #7f8c8d;
            --bg: #f8fafc;
            --white: #ffffff;
            --border: #e2e8f0;
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--bg);
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        .booking-card {
            background: var(--white);
            width: 100%;
            max-width: 400px;
            padding: 32px;
            border-radius: 20px;
            box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.1), 0 10px 10px -5px rgba(0, 0, 0, 0.04);
        }

        .header {
            text-align: center;
            margin-bottom: 30px;
        }

        .header h2 {
            margin: 0;
            color: var(--text-dark);
            font-size: 1.5rem;
            font-weight: 700;
        }

        .header p {
            color: var(--text-light);
            font-size: 0.9rem;
            margin-top: 8px;
        }

        .input-wrapper {
            margin-bottom: 20px;
        }

        label {
            display: block;
            font-size: 0.85rem;
            font-weight: 600;
            color: var(--text-dark);
            margin-bottom: 6px;
        }

        input {
            width: 100%;
            padding: 12px 16px;
            border: 1.5px solid var(--border);
            border-radius: 10px;
            font-size: 1rem;
            color: var(--text-dark);
            background: #fff;
            transition: all 0.2s ease;
            box-sizing: border-box;
        }

        input:focus {
            outline: none;
            border-color: var(--primary);
            box-shadow: 0 0 0 4px rgba(39, 174, 96, 0.1);
        }

        .btn-confirm {
            width: 100%;
            background: var(--primary);
            color: white;
            border: none;
            padding: 16px;
            border-radius: 12px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            margin-top: 10px;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 8px;
        }

        .btn-confirm:hover {
            background: var(--primary-dark);
            transform: translateY(-2px);
            box-shadow: 0 10px 15px -3px rgba(39, 174, 96, 0.3);
        }

        .btn-confirm:disabled {
            background: #ccc;
            cursor: not-allowed;
            transform: none;
        }

        .secure-note {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 5px;
            font-size: 0.75rem;
            color: var(--text-light);
            margin-top: 20px;
        }
    </style>
</head>
<body>

<div class="booking-card">
    <div class="header">
        <h2>Passenger Details</h2>
        <p>Complete your booking for Gerayo</p>
    </div>

    <div class="input-wrapper">
        <label for="name">Full Name</label>
        <input type="text" id="name" placeholder="e.g. Jean Doe">
    </div>

    <div class="input-wrapper">
        <label for="phone">Phone Number</label>
        <input type="tel" id="phone" placeholder="e.g. 078XXXXXXX">
    </div>

    <button class="btn-confirm" onclick="confirmBooking()">
        Confirm Booking
    </button>

    <div class="secure-note">
        🔒 Your information is encrypted and secure.
    </div>
</div>

<script>
    // 1. Get BOTH IDs from the URL
    const params = new URLSearchParams(window.location.search);
    const busId = params.get("busId");
    const company_id = params.get("companyId"); // This gets the "1" from your URL

    function confirmBooking() {
        const name = document.getElementById("name").value.trim();
        const phone = document.getElementById("phone").value.trim();

        if (!name || !phone) {
            alert("Please fill in all details to proceed.");
            return;
        }

        if (!busId || !company_id) {
            alert("Error: Missing bus or company information. Please search again.");
            return;
        }

        const btn = document.querySelector('.btn-confirm');
        btn.innerText = "Processing...";
        btn.disabled = true;

        // 2. Send the exact payload the server expects
        fetch("/api/book", {
            method: "POST",
            headers: {
                "Content-Type": "application/json"
            },
            body: JSON.stringify({ 
                busId: busId, 
                company_id: company_id, 
                name: name, 
                phone: phone 
            })
        })
        .then(res => {
            if (!res.ok) {
                // This helps us see the real error if it fails again
                return res.json().then(err => { throw new Error(err.error || "Failed to book") });
            }
            return res.json();
        })
        .then(data => {
            // Use the 'company_id' variable you defined at the top!
            window.location.href = `payment.html?bookingId=${data.bookingId}&company_id=${company_id}`;
        })
        .catch(err => {
            console.error("Booking Error:", err);
            alert("Error: " + err.message);
            btn.innerText = "Confirm Booking";
            btn.disabled = false;
        });
    }
</script>

</body>
</html>
