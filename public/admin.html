<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Gerayo Admin | Control Panel</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">

<style>
:root {
    --sidebar-bg: #1e293b;
    --primary: #27ae60;
    --bg: #f1f5f9;
    --white: #ffffff;
    --text-main: #334155;
}

body {
    font-family: 'Inter', sans-serif;
    background-color: var(--bg);
    margin: 0;
    display: flex;
}

/* Sidebar */
.sidebar {
    width: 240px;
    background: var(--sidebar-bg);
    color: white;
    padding: 20px;
    position: fixed;
    height: 100vh;
}

.sidebar h1 {
    text-align: center;
    color: var(--primary);
}

.nav-item {
    padding: 12px;
    margin: 10px 0;
    border-radius: 8px;
    cursor: pointer;
    color: #94a3b8;
}

.nav-item.active {
    background: rgba(39,174,96,0.1);
    color: var(--primary);
    font-weight: bold;
}

/* Main */
.main-content {
    margin-left: 260px;
    padding: 40px;
    width: 100%;
}

.card {
    background: white;
    padding: 20px;
    border-radius: 10px;
    margin-bottom: 20px;
}

/* Form */
.admin-form {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(150px,1fr));
    gap: 10px;
}

input {
    padding: 10px;
    border: 1px solid #ccc;
    border-radius: 5px;
}

button {
    background: var(--primary);
    color: white;
    border: none;
    padding: 10px;
    border-radius: 5px;
    cursor: pointer;
}

/* Table */
table {
    width: 100%;
    border-collapse: collapse;
}

th, td {
    padding: 10px;
    border-bottom: 1px solid #ddd;
}

.status-badge {
    background: #dcfce7;
    color: #166534;
    padding: 4px 8px;
    border-radius: 10px;
}
</style>
</head>

<body>

<!-- SIDEBAR -->
<div class="sidebar">
    <h1>GERAYO</h1>

    <div class="nav-item active" onclick="showSection('buses', event)">
        🚌 Manage Buses
    </div>

    <div class="nav-item" onclick="showSection('bookings', event)">
        🎟 View Bookings
    </div>
</div>

<!-- MAIN -->
<div class="main-content">

    <!-- 🚌 BUS SECTION -->
    <div id="busesSection">

        <div class="card">
            <h2>Add Bus</h2>

            <div class="admin-form">
                <input id="company" placeholder="Company">
                <input id="from" placeholder="From">
                <input id="to" placeholder="To">
                <input id="time" type="time">
                <input id="price" type="number" placeholder="Price">

                <button onclick="addBus()">Add Bus</button>
            </div>
        </div>

        <div class="card">
            <h2>Bus List</h2>

            <table>
                <thead>
                    <tr>
                        <th>Company</th>
                        <th>Route</th>
                        <th>Time</th>
                        <th>Price</th>
                    </tr>
                </thead>

                <tbody id="busList"></tbody>
            </table>
        </div>

    </div>

    <!-- 🎟 BOOKINGS SECTION -->
    <div id="bookingsSection" style="display:none;">

        <div class="card">
            <h2>Bookings</h2>

            <table>
                <thead>
                    <tr>
                        <th>ID</th>
                        <th>Name</th>
                        <th>Phone</th>
                        <th>Bus</th>
                    </tr>
                </thead>

                <tbody id="bookingList"></tbody>
            </table>
        </div>

    </div>

</div>

<script>

/* NAVIGATION */
function showSection(section, event) {
    document.getElementById("busesSection").style.display =
        section === "buses" ? "block" : "none";

    document.getElementById("bookingsSection").style.display =
        section === "bookings" ? "block" : "none";

    document.querySelectorAll(".nav-item").forEach(item =>
        item.classList.remove("active")
    );

    event.target.classList.add("active");

    if (section === "bookings") {
        loadBookings();
    }
}

/* ADD BUS */
function addBus() {
    const data = {
        company: document.getElementById("company").value.trim(),
        from: document.getElementById("from").value.trim(),
        to: document.getElementById("to").value.trim(),
        time: document.getElementById("time").value,
        price: document.getElementById("price").value
    };

    if (!data.company || !data.from || !data.to) {
        alert("Fill all fields");
        return;
    }

    fetch("/api/add-bus", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify(data)
    })
    .then(res => res.json())
    .then(() => {
        loadBuses();
        document.querySelectorAll("input").forEach(i => i.value = "");
    });
}

/* LOAD BUSES */
function loadBuses() {
    fetch("/api/all-buses")
        .then(res => res.json())
        .then(data => {
            document.getElementById("busList").innerHTML =
                data.map(bus => `
                    <tr>
                        <td>${bus.company}</td>
                        <td>${bus.from} → ${bus.to}</td>
                        <td>${bus.time}</td>
                        <td>${bus.price} RWF</td>
                    </tr>
                `).join("");
        });
}

/* LOAD BOOKINGS */
function loadBookings() {
    fetch("/api/bookings")
        .then(res => res.json())
        .then(data => {
            document.getElementById("bookingList").innerHTML =
                data.length === 0
                    ? "<tr><td colspan='4'>No bookings yet</td></tr>"
                    : data.map(b => `
                        <tr>
                            <td>#${b.id}</td>
                            <td>${b.name}</td>
                            <td>${b.phone}</td>
                            <td>${b.busId}</td>
                        </tr>
                    `).join("");
        });
}

/* INITIAL LOAD */
loadBuses();

</script>

</body>
</html>
