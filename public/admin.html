<h1>GERAYO Admin Dashboard</h1>

<h2>Add Bus</h2>

<input id="company" placeholder="Company Name" />
<input id="from" placeholder="From" />
<input id="to" placeholder="To" />
<input id="time" placeholder="Time" />
<input id="price" placeholder="Price" />

<button onclick="addBus()">Add Bus</button>

<h2>All Buses</h2>
<div id="busList"></div>
<script>
function addBus() {
  const company = document.getElementById("company").value;
  const from = document.getElementById("from").value;
  const to = document.getElementById("to").value;
  const time = document.getElementById("time").value;
  const price = document.getElementById("price").value;

  fetch("/api/add-bus", {
    method: "POST",
    headers: {
      "Content-Type": "application/json"
    },
    body: JSON.stringify({ company, from, to, time, price })
  })
  .then(res => res.json())
  .then(() => loadBuses());
}

function loadBuses() {
  fetch("/api/all-buses")
    .then(res => res.json())
    .then(data => {
      const container = document.getElementById("busList");
      container.innerHTML = "";

      data.forEach(bus => {
        container.innerHTML += `
          <p>${bus.company} | ${bus.from} → ${bus.to} | ${bus.time} | ${bus.price} RWF</p>
        `;
      });
    });
}

loadBuses();
</script>
