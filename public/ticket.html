<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gerayo - Your Ticket</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&family=JetBrains+Mono&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #27ae60;
            --dark: #2c3e50;
            --bg: #e2e8f0;
            --white: #ffffff;
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--bg);
            margin: 0;
            padding: 40px 20px;
            display: flex;
            justify-content: center;
        }

        .ticket {
            background: var(--white);
            width: 100%;
            max-width: 350px;
            border-radius: 20px;
            overflow: hidden;
            box-shadow: 0 15px 30px rgba(0,0,0,0.1);
            position: relative;
        }

        .ticket-header {
            background-color: var(--primary);
            color: white;
            padding: 20px;
            text-align: center;
        }

        .ticket-header h1 {
            margin: 0;
            font-size: 18px;
            letter-spacing: 2px;
            font-weight: 800;
            text-transform: uppercase;
        }

        .ticket-body {
            padding: 25px;
        }

        .info-row {
            display: flex;
            justify-content: space-between;
            margin-bottom: 20px;
        }

        .label {
            display: block;
            font-size: 11px;
            text-transform: uppercase;
            color: #94a3b8;
            font-weight: 600;
            margin-bottom: 4px;
        }

        .value {
            display: block;
            font-size: 16px;
            font-weight: 600;
            color: var(--dark);
        }

        .divider {
            position: relative;
            height: 20px;
            border-top: 2px dashed #e2e8f0;
            margin: 10px 0;
        }

        .divider::before, .divider::after {
            content: '';
            position: absolute;
            width: 20px;
            height: 20px;
            background-color: var(--bg);
            border-radius: 50%;
            top: -11px;
        }

        .divider::before { left: -30px; }
        .divider::after { right: -30px; }

        .qr-section {
            text-align: center;
            padding: 20px;
            background: #f8fafc;
        }

        .qr-placeholder {
            width: 150px;
            height: 150px;
            background: #fff;
            border: 1px solid #e2e8f0;
            margin: 0 auto 15px;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 10px;
            border-radius: 10px;
        }

        .booking-id {
            font-family: 'JetBrains Mono', monospace;
            background: #e2e8f0;
            padding: 5px 12px;
            border-radius: 5px;
            font-size: 14px;
            color: var(--dark);
        }

        .footer-note {
            font-size: 12px;
            color: #64748b;
            margin-top: 15px;
        }

        .no-print {
            margin-top: 20px;
            background: none;
            border: 1px solid var(--primary);
            color: var(--primary);
            width: 100%;
            padding: 10px;
            border-radius: 8px;
            cursor: pointer;
            font-weight: 600;
        }

        @media print {
            .no-print { display: none; }
            body { padding: 0; background: white; }
            .ticket { box-shadow: none; border: 1px solid #ddd; }
        }
    </style>
</head>
<body>

<div class="ticket">
    <div class="ticket-header">
        <h1 id="company-name">GERAYO TICKET</h1>
    </div>

    <div class="ticket-body">
        <div class="info-row">
            <div>
                <span class="label">Passenger</span>
                <span class="value" id="passenger-name">Loading...</span>
            </div>
            <div style="text-align: right;">
                <span class="label">Date</span>
                <span class="value" id="ticket-date">...</span>
            </div>
        </div>

        <div class="info-row">
            <div>
                <span class="label">From</span>
                <span class="value" id="from-city">...</span>
            </div>
            <div style="text-align: center; color: var(--primary); padding-top: 15px;">
                →
            </div>
            <div style="text-align: right;">
                <span class="label">To</span>
                <span class="value" id="to-city">...</span>
            </div>
        </div>

        <div class="info-row">
            <div>
                <span class="label">Departure Time</span>
                <span class="value" id="departure-time">...</span>
            </div>
            <div style="text-align: right;">
                <span class="label">Seat</span>
                <span class="value" id="seat-number">Auto</span>
            </div>
        </div>
    </div>

    <div class="divider"></div>

    <div class="qr-section">
        <div class="qr-placeholder">
            <img id="qr-code-img" src="" alt="QR Code" style="width: 100%; display: none;">
            <div id="qr-loading">Generating QR...</div>
        </div>
        <span class="label">Booking Reference</span>
        <span class="booking-id" id="display-id">REF-0000</span>
        <p class="footer-note">Please present this digital ticket to the conductor when boarding.</p>
        
        <button class="no-print" onclick="window.print()">Download as PDF / Print</button>
    </div>
</div>

<script>
    const params = new URLSearchParams(window.location.search);
    const id = params.get("id");

    if (id) {
        // Fetch real data from the server using the Booking ID
        fetch(`/api/ticket/${id}`)
            .then(res => {
                if (!res.ok) throw new Error("Ticket not found");
                return res.json();
            })
            .then(data => {
                // Update UI with real data
                document.getElementById("passenger-name").innerText = data.passenger_name;
                document.getElementById("company-name").innerText = data.company_name;
                document.getElementById("from-city").innerText = data.from_city;
                document.getElementById("to-city").innerText = data.to_city;
                document.getElementById("departure-time").innerText = data.time;
                document.getElementById("display-id").innerText = "GRY-" + data.booking_id;
                
                // Set a current date (since we don't store travel date yet)
                const today = new Date().toLocaleDateString('en-GB', {
                    day: 'numeric', month: 'long', year: 'numeric'
                });
                document.getElementById("ticket-date").innerText = today;

                // Update QR Code with real ticket data
                const qrData = `GERAYO|ID:${data.booking_id}|NAME:${data.passenger_name}|ROUTE:${data.from_city}-${data.to_city}`;
                const qrImg = document.getElementById("qr-code-img");
                qrImg.src = `https://api.qrserver.com/v1/create-qr-code/?size=150x150&data=${encodeURIComponent(qrData)}`;
                qrImg.style.display = "block";
                document.getElementById("qr-loading").style.display = "none";
            })
            .catch(err => {
                console.error(err);
                document.getElementById("passenger-name").innerText = "Error loading ticket";
            });
    } else {
        document.getElementById("passenger-name").innerText = "No Ticket ID provided";
    }
</script>

</body>
</html>
