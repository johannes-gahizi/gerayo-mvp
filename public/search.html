<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Gerayo - Search & Book</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">

<style>
:root {
    --primary: #27ae60;
    --bg: #f5f7fa;
}

body {
    font-family: 'Inter', sans-serif;
    background: var(--bg);
    margin: 0;
    padding: 20px;
}

/* Search Box */
.search-box {
    background: white;
    padding: 25px;
    border-radius: 16px;
    max-width: 600px;
    margin: auto;
    box-shadow: 0 5px 20px rgba(0,0,0,0.08);
}

select, button, input {
    width: 100%;
    padding: 12px;
    margin-top: 10px;
    border-radius: 8px;
    border: 1px solid #ddd;
}

button {
    background: var(--primary);
    color: white;
    font-weight: bold;
    cursor: pointer;
}

/* Results */
.result {
    max-width: 600px;
    margin: 20px auto;
}

.card {
    background: white;
    padding: 15px;
    margin-bottom: 10px;
    border-radius: 12px;
    display: flex;
    justify-content: space-between;
}

/* Booking Form */
.booking {
    display: none;
    max-width: 600px;
    margin: auto;
    background: white;
    padding: 20px;
    border-radius: 16px;
}
</style>
</head>

<body>

<div class="search-box">
    <h2>Search Tickets</h2>

    <select id="from">
        <option>Kigali</option>
        <option>Musanze</option>
        <option>Rubavu</option>
    </select>

    <select id="to">
        <option>Musanze</option>
        <option>Kigali</option>
        <option>Rubavu</option>
    </select>

    <button onclick="search()">Search</button>
</div>

<div id="results" class="result"></div>

<div id="booking" class="booking">
    <h3>Passenger Info</h3>

    <p id="selectedBus"></p>

    <input id="name" placeholder="Full Name">
    <input id="phone" placeholder="Phone">

    <button onclick="confirmBooking()">Continue to Payment</button>
</div>

<script>
let selectedBus = null;

// 🔍 SEARCH
async function search() {
    const from = document.getElementById("from").value;
    const to = document.getElementById("to").value;

    const res = await fetch(`/api/buses?from=${from}&to=${to}`);
    const data = await res.json();

    const results = document.getElementById("results");

    if (data.length === 0) {
        results.innerHTML = "No buses found";
        return;
    }

    results.innerHTML = data.map(bus => `
        <div class="card">
            <div>
                <b>${bus.company}</b><br>
                ${bus.from_city} → ${bus.to_city}<br>
                ${bus.time}
            </div>
            <div>
                ${bus.price} RWF<br>
                <button onclick='selectBus(${JSON.stringify(bus)})'>Select</button>
            </div>
        </div>
    `).join("");
}

// 🚌 SELECT BUS
function selectBus(bus) {
    selectedBus = bus;

    document.getElementById("booking").style.display = "block";
    document.getElementById("selectedBus").innerText =
        `${bus.from_city} → ${bus.to_city} | ${bus.time} | ${bus.price} RWF`;

    window.scrollTo(0, document.body.scrollHeight);
}

// 🎟 BOOK
async function confirmBooking() {
    const name = document.getElementById("name").value;
    const phone = document.getElementById("phone").value;

    if (!name || !phone) return alert("Fill all fields");

    const res = await fetch("/api/book", {
        method: "POST",
        headers: {"Content-Type": "application/json"},
        body: JSON.stringify({
            busId: selectedBus.id,
            name,
            phone
        })
    });

    const data = await res.json();

    if (data.success) {
        // 👉 go to payment
        window.location.href = `payment.html?bookingId=${data.bookingId}`;
    } else {
        alert("Booking failed");
    }
}
</script>

</body>
</html>
