<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Gerayo - Search & Book</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
:root {
    --primary: #16a34a;
    --primary-soft: #dcfce7;
    --dark: #0f172a;
    --text: #1e293b;
    --muted: #64748b;
    --border: #e2e8f0;
    --bg: #f8fafc;
    --white: #ffffff;
}
body {
    font-family: 'Inter', sans-serif;
    background: linear-gradient(135deg, #f8fafc 0%, #ecfdf5 100%);
    margin: 0;
    padding: 24px;
    color: var(--text);
}
.container {
    max-width: 760px;
    margin: 0 auto;
}
.search-box {
    background: var(--white);
    padding: 24px;
    border-radius: 20px;
    box-shadow: 0 15px 35px rgba(15, 23, 42, 0.08);
    border: 1px solid var(--border);
}
.search-box h2 {
    margin: 0 0 6px;
    font-size: 1.5rem;
}
.search-box p {
    color: var(--muted);
    margin-top: 0;
}
select, button, input {
    width: 100%;
    padding: 12px 14px;
    margin-top: 10px;
    border-radius: 10px;
    border: 1px solid var(--border);
    font-size: 1rem;
    box-sizing: border-box;
}
button {
    background: var(--primary);
    color: white;
    font-weight: 700;
    cursor: pointer;
    border: none;
}
button:hover { opacity: 0.95; }
.result {
    margin-top: 20px;
}
.card {
    background: var(--white);
    padding: 16px;
    margin-bottom: 12px;
    border-radius: 16px;
    display: flex;
    justify-content: space-between;
    align-items: center;
    gap: 12px;
    border: 1px solid var(--border);
}
.card .meta { flex: 1; }
.card .price { text-align: right; }
.booking {
    display: none;
    margin-top: 20px;
    background: var(--white);
    padding: 20px;
    border-radius: 16px;
    border: 1px solid var(--border);
}
.status {
    margin-top: 12px;
    color: var(--muted);
    font-size: 0.95rem;
}
</style>
</head>
<body>
<div class="container">
    <div class="search-box">
        <h2>Search Tickets</h2>
        <p>Find a comfortable ride between Rwanda’s major cities.</p>
        <select id="from">
            <option>Kigali</option>
            <option>Musanze</option>
            <option>Rubavu</option>
        </select>
        <select id="to">
            <option>Musanze</option>
            <option>Kigali</option>
            <option>Rubavu</option>
        </select>
        <button onclick="search()">Search Buses</button>
    </div>

    <div id="results" class="result"></div>

    <div id="booking" class="booking">
        <h3>Passenger Info</h3>
        <p id="selectedBus"></p>
        <input id="name" placeholder="Full Name">
        <input id="phone" placeholder="Phone Number">
        <button onclick="confirmBooking()">Continue to Payment</button>
    </div>
</div>

<script>
let selectedBus = null;

async function search() {
    const from = document.getElementById("from").value;
    const to = document.getElementById("to").value;
    const results = document.getElementById("results");

    results.innerHTML = '<div class="status">Searching available buses...</div>';

    try {
        const res = await fetch(`/api/buses?from=${encodeURIComponent(from)}&to=${encodeURIComponent(to)}`);
        const data = await res.json();

        if (!Array.isArray(data) || data.length === 0) {
            results.innerHTML = '<div class="status">No buses found for this route yet. Try another route.</div>';
            return;
        }

        results.innerHTML = data.map(bus => `
            <div class="card">
                <div class="meta">
                    <strong>${bus.company}</strong><br>
                    ${bus.from_city} → ${bus.to_city}<br>
                    ${bus.time} • ${Math.max(0, bus.seats_left || 0)} seats left
                </div>
                <div class="price">
                    <div>${Number(bus.price).toLocaleString()} RWF</div>
                    <button onclick='selectBus(${JSON.stringify(bus)})'>Select</button>
                </div>
            </div>
        `).join("");
    } catch (error) {
        console.error(error);
        results.innerHTML = '<div class="status">We could not load buses right now. Please try again shortly.</div>';
    }
}

function selectBus(bus) {
    selectedBus = bus;
    document.getElementById("booking").style.display = "block";
    document.getElementById("selectedBus").innerText =
        `${bus.from_city} → ${bus.to_city} | ${bus.time} | ${Number(bus.price).toLocaleString()} RWF`;

    window.scrollTo({ top: document.body.scrollHeight, behavior: 'smooth' });
}

async function confirmBooking() {
    const name = document.getElementById("name").value.trim();
    const phone = document.getElementById("phone").value.trim();

    if (!selectedBus) {
        alert("Please select a bus first.");
        return;
    }

    if (!name || !phone) {
        alert("Please fill in your name and phone number.");
        return;
    }

    try {
        const res = await fetch("/api/book", {
            method: "POST",
            headers: {"Content-Type": "application/json"},
            body: JSON.stringify({
                busId: selectedBus.id,
                name,
                phone
            })
        });

        const data = await res.json();

        if (data.success) {
            window.location.href = `payment.html?bookingId=${data.bookingId}`;
        } else {
            alert(data.error || "Booking failed");
        }
    } catch (error) {
        console.error(error);
        alert("Booking could not be completed right now.");
    }
}
</script>
</body>
</html>
