<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gerayo - Passenger Details</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        :root { --primary: #27ae60; --bg: #f8fafc; --text: #1e293b; --border: #e2e8f0; }
        body { font-family: 'Inter', sans-serif; background: var(--bg); margin: 0; padding: 20px; display: flex; justify-content: center; align-items: center; min-height: 100vh; }
        
        .booking-card { background: white; padding: 32px; border-radius: 24px; box-shadow: 0 20px 25px -5px rgba(0,0,0,0.05); width: 100%; max-width: 420px; border: 1px solid var(--border); }
        h2 { color: var(--text); margin: 0 0 20px 0; font-size: 1.25rem; font-weight: 800; text-align: center; }
        
        /* Trip Preview Box */
        .summary-box { background: #f1f5f9; padding: 16px; border-radius: 12px; margin-bottom: 24px; border: 1px solid var(--border); }
        .summary-box .route { font-weight: 700; color: var(--text); font-size: 0.95rem; display: block; }
        .summary-box .meta { font-size: 0.8rem; color: #64748b; margin-top: 4px; display: block; }

        .input-group { margin-bottom: 20px; }
        label { display: block; font-size: 0.75rem; font-weight: 700; color: #64748b; margin-bottom: 8px; text-transform: uppercase; letter-spacing: 0.5px; }
        input { width: 100%; padding: 14px; border: 2.3px solid var(--border); border-radius: 12px; font-size: 1rem; outline: none; box-sizing: border-box; transition: all 0.2s; }
        input:focus { border-color: var(--primary); background: #fff; }

        .confirm-btn { width: 100%; padding: 16px; background: var(--primary); color: white; border: none; border-radius: 14px; font-weight: 700; font-size: 1rem; cursor: pointer; transition: 0.3s; margin-top: 10px; }
        .confirm-btn:hover { background: #219150; transform: translateY(-2px); box-shadow: 0 10px 15px -3px rgba(39, 174, 96, 0.3); }
        
        .loader { display: none; text-align: center; color: var(--primary); font-weight: 700; margin-top: 15px; font-size: 0.9rem; }
    </style>
</head>
<body>

<div class="booking-card">
    <h2>Passenger Info</h2>
    
    <div id="bus-summary" class="summary-box">
        <span class="route" id="display-route">Fetching trip details...</span>
        <span class="meta" id="display-time">Please wait</span>
    </div>

    <div class="input-group">
        <label>Your Full Name</label>
        <input type="text" id="passenger-name" placeholder="Enter your name" required>
    </div>

    <div class="input-group">
        <label>Payment Phone (MoMo)</label>
        <input type="tel" id="passenger-phone" placeholder="078 / 079 / 072 / 073" required>
    </div>

    <button class="confirm-btn" id="submit-btn" onclick="submitBooking()">Continue to Payment</button>
    <div id="loading" class="loader">🔄 Securing your seat...</div>
</div>

<script>
    const urlParams = new URLSearchParams(window.location.search);
    const busId = urlParams.get('busId');

    // FIX 1: Corrected filename to user-login.html
    if (!localStorage.getItem("userToken")) {
        alert("Please login to access booking.");
        window.location.href = "user-login.html";
    }

    window.onload = async () => {
        // FIX 2: If no busId, don't error out—just ask them to pick one.
        if (!busId) {
            document.getElementById('display-route').innerText = "Ready to book?";
            document.getElementById('display-time').innerText = "Please select a bus route from the list.";
            return;
        }

        try {
            const res = await fetch(`/api/search`); 
            const buses = await res.json();
            const bus = buses.find(b => b.id == busId);
            
            if (bus) {
                document.getElementById('display-route').innerText = `${bus.from_city} → ${bus.to_city}`;
                document.getElementById('display-time').innerText = `${bus.time} | ${bus.price} RWF`;
            } else {
                // If ID is invalid
                document.getElementById('display-route').innerText = "Bus not found";
            }
        } catch (e) {
            console.error("Preview failed", e);
        }
    };

    async function submitBooking() {
        const name = document.getElementById('passenger-name').value.trim();
        const phone = document.getElementById('passenger-phone').value.trim();
        
        // FIX 3: Ensure we have a bus selected before allowing booking
        if (!busId) {
            alert("Please go back and select a specific bus first.");
            return;
        }

        if (!name || !phone) {
            alert("Please provide your name and phone number.");
            return;
        }

        if (!/^07[2389]\d{7}$/.test(phone)) {
            alert("Please enter a valid Rwandan phone number.");
            return;
        }

        const btn = document.getElementById('submit-btn');
        const loader = document.getElementById('loading');
        btn.style.display = 'none';
        loader.style.display = 'block';

        try {
            const response = await fetch('/api/book', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    busId: busId,
                    name: name,
                    phone: phone
                })
            });

            const data = await response.json();
            if (response.ok) {
                window.location.href = `payment.html?bookingId=${data.bookingId}`;
            } else {
                throw new Error(data.error || "Booking failed");
            }
        } catch (error) {
            alert("Oops! " + error.message);
            btn.style.display = 'block';
            loader.style.display = 'none';
        }
    }
</script>
</body>
</html>
