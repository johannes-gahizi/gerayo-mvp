<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Gerayo Admin Access</title>
  <style>
    :root {
      --primary: #2563eb;
      --primary-hover: #1d4ed8;
      --bg: #f8fafc;
      --text: #1e293b;
      --card-bg: #ffffff;
    }

    body {
      font-family: 'Inter', -apple-system, sans-serif;
      background-color: var(--bg);
      color: var(--text);
      display: flex;
      align-items: center;
      justify-content: center;
      height: 100vh;
      margin: 0;
    }

    .login-card {
      background: var(--card-bg);
      padding: 2.5rem;
      border-radius: 12px;
      box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.1), 0 8px 10px -6px rgba(0, 0, 0, 0.1);
      width: 100%;
      max-width: 400px;
      text-align: center;
    }

    h2 {
      margin-bottom: 0.5rem;
      font-weight: 700;
      color: #0f172a;
    }

    p.subtitle {
      color: #64748b;
      font-size: 0.875rem;
      margin-bottom: 2rem;
    }

    .input-group {
      text-align: left;
      margin-bottom: 1.25rem;
    }

    label {
      display: block;
      font-size: 0.875rem;
      font-weight: 500;
      margin-bottom: 0.5rem;
    }

    input {
      width: 100%;
      padding: 0.75rem;
      border: 1px solid #cbd5e1;
      border-radius: 6px;
      box-sizing: border-box;
      font-size: 1rem;
      transition: border-color 0.2s, box-shadow 0.2s;
    }

    input:focus {
      outline: none;
      border-color: var(--primary);
      box-shadow: 0 0 0 3px rgba(37, 99, 235, 0.1);
    }

    button {
      width: 100%;
      padding: 0.75rem;
      background-color: var(--primary);
      color: white;
      border: none;
      border-radius: 6px;
      font-size: 1rem;
      font-weight: 600;
      cursor: pointer;
      transition: background-color 0.2s;
      margin-top: 1rem;
    }

    button:hover {
      background-color: var(--primary-hover);
    }

    button:active {
      transform: scale(0.98);
    }

    #error {
      color: #dc2626;
      font-size: 0.875rem;
      margin-top: 1rem;
      min-height: 1.25rem;
    }
  </style>
</head>
<body>

  <div class="login-card">
    <h2>Gerayo Admin</h2>
    <p class="subtitle">Secure access to transit management</p>

    <div class="input-group">
      <label for="username">Username</label>
      <input type="text" id="username" placeholder="e.g. admin_johannes">
    </div>

    <div class="input-group">
      <label for="password">Password</label>
      <input type="password" id="password" placeholder="••••••••">
    </div>

    <button onclick="login()" id="loginBtn">Sign In</button>

    <p id="error"></p>
  </div>

  <script>
    // ✅ 1. Auto-redirect if already logged in
    const existingId = localStorage.getItem("companyId");
    if (existingId && existingId !== "undefined") {
        window.location.href = "/admin.html";
    }

    async function login() {
      const username = document.getElementById("username").value.trim();
      const password = document.getElementById("password").value;
      const errorEl = document.getElementById("error");
      const btn = document.getElementById("loginBtn");

      if (!username || !password) {
          errorEl.innerText = "Please enter both credentials.";
          return;
      }

      // Visual feedback
      errorEl.innerText = "";
      btn.innerText = "Authenticating...";
      btn.disabled = true;

      try {
        const res = await fetch("/api/login", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ username, password })
        });

        const data = await res.json();

        if (data.success) {
          // ✅ 2. Save both ID and Name for the Admin Panel to use
          localStorage.setItem("companyId", data.token);
          localStorage.setItem("companyName", data.companyName);
          window.location.href = "/admin.html";
        } else {
          errorEl.innerText = data.message || "Invalid credentials. Please try again.";
          btn.innerText = "Sign In";
          btn.disabled = false;
        }
      } catch (err) {
        console.error("Login Error:", err);
        errorEl.innerText = "Server connection failed.";
        btn.innerText = "Sign In";
        btn.disabled = false;
      }
    }

    // Allow pressing "Enter" to login
    document.addEventListener("keypress", (e) => {
      if (e.key === "Enter") login();
    });
  </script>

</body>
</html>
