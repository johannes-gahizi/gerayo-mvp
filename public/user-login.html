<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gerayo | Login</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #27ae60;
            --primary-hover: #219150;
            --dark: #0f172a;
            --bg: #f8fafc;
            --white: #ffffff;
            --border: #e2e8f0;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: linear-gradient(135deg, #f8fafc 0%, #e2e8f0 100%);
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        .auth-card {
            background: var(--white);
            width: 100%;
            max-width: 380px;
            padding: 40px;
            border-radius: 24px;
            box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.1);
            border: 1px solid var(--border);
            text-align: center;
        }

        h2 {
            margin: 0 0 8px 0;
            color: var(--dark);
            font-size: 1.75rem;
            font-weight: 800;
        }

        p {
            color: #64748b;
            font-size: 0.95rem;
            margin-bottom: 32px;
        }

        .input-group {
            text-align: left;
            margin-bottom: 20px;
        }

        label {
            display: block;
            font-size: 0.75rem;
            font-weight: 700;
            color: var(--dark);
            margin-bottom: 8px;
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }

        input {
            width: 100%;
            padding: 14px 16px;
            border: 1.5px solid var(--border);
            border-radius: 12px;
            font-size: 1rem;
            box-sizing: border-box;
            transition: all 0.2s;
            background: #fcfcfc;
        }

        input:focus {
            outline: none;
            border-color: var(--primary);
            background: #fff;
            box-shadow: 0 0 0 4px rgba(39, 174, 96, 0.1);
        }

        .btn {
            width: 100%;
            background: var(--primary);
            color: white;
            border: none;
            padding: 16px;
            border-radius: 12px;
            font-size: 1rem;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.3s;
            margin-top: 10px;
        }

        .btn:hover {
            background: var(--primary-hover);
            transform: translateY(-1px);
        }

        .btn:disabled {
            background: #cbd5e1;
            cursor: not-allowed;
        }

        .link {
            margin-top: 24px;
            font-size: 0.9rem;
            color: #64748b;
        }

        .link a {
            color: var(--primary);
            text-decoration: none;
            font-weight: 600;
        }

        .link a:hover {
            text-decoration: underline;
        }

        .forgot-pass {
            display: block;
            margin-top: 8px;
            font-size: 0.8rem;
            color: #94a3b8;
            text-align: right;
            text-decoration: none;
        }
    </style>
</head>
<body>
    <div class="auth-card">
        <h2>Welcome Back</h2>
        <p>Login to book your next trip</p>
        
        <div class="input-group">
            <label>Email Address</label>
            <input type="email" id="email" placeholder="you@example.com" autocomplete="username">
        </div>
        
        <div class="input-group">
            <label>Password</label>
            <input type="password" id="password" placeholder="••••••••" autocomplete="current-password">
            <a href="#" class="forgot-pass">Forgot password?</a>
        </div>
        
        <button class="btn" id="loginBtn" onclick="loginUser()">Login</button>
        
        <div class="link">
            Don't have an account? <a href="signup.html">Sign up</a>
        </div>
    </div>

    <script>
        async function loginUser() {
            const email = document.getElementById('email').value.trim();
            const password = document.getElementById('password').value;
            const btn = document.getElementById('loginBtn');

            if (!email || !password) {
                alert("Please enter both your email and password.");
                return;
            }

            btn.innerText = "Authenticating...";
            btn.disabled = true;

            try {
                const response = await fetch('/api/user-login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email, password })
                });

                const data = await response.json();

                if (data.success) {
                    localStorage.setItem("userToken", data.token);
                    localStorage.setItem("userName", data.userName);
                    window.location.href = "search.html";
                } else {
                    alert("Login failed: " + (data.error || "Check your credentials"));
                }
            } catch (err) {
                console.error("Login Error:", err);
                alert("Cannot connect to the server. Please try again later.");
            } finally {
                btn.innerText = "Login";
                btn.disabled = false;
            }
        }

        // Allow 'Enter' key to trigger login
        document.addEventListener('keypress', (e) => {
            if (e.key === 'Enter') loginUser();
        });
    </script>
</body>
</html>
