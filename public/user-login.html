<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gerayo - Login</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        :root { --primary: #27ae60; --bg: #f0f2f5; --text: #2c3e50; }
        body { font-family: 'Inter', sans-serif; background: var(--bg); display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .auth-card { background: white; padding: 40px; border-radius: 16px; box-shadow: 0 10px 25px rgba(0,0,0,0.05); width: 100%; max-width: 360px; text-align: center; }
        h2 { margin-bottom: 8px; color: var(--text); }
        p { color: #64748b; font-size: 14px; margin-bottom: 24px; }
        .input-group { text-align: left; margin-bottom: 16px; }
        label { display: block; font-size: 12px; font-weight: 700; color: #94a3b8; margin-bottom: 4px; text-transform: uppercase; }
        input { width: 100%; padding: 12px; border: 1px solid #e2e8f0; border-radius: 8px; font-size: 16px; box-sizing: border-box; }
        .btn { width: 100%; padding: 14px; background: var(--primary); color: white; border: none; border-radius: 8px; font-weight: 700; cursor: pointer; margin-top: 10px; }
        .link { margin-top: 20px; font-size: 14px; color: #64748b; }
        .link a { color: var(--primary); text-decoration: none; font-weight: 600; }
    </style>
</head>
<body>
    <div class="auth-card">
        <h2>Welcome Back</h2>
        <p>Login to book your next trip</p>
        <div class="input-group">
            <label>Email</label>
            <input type="email" id="email" placeholder="you@example.com">
        </div>
        <div class="input-group">
            <label>Password</label>
            <input type="password" id="password" placeholder="••••••••">
        </div>
       <button class="btn" onclick="loginUser()">Login</button>
        <div class="link">Don't have an account? <a href="signup.html">Sign up</a></div>
    </div>

    <script>
      async function loginUser() {
    const email = document.getElementById('email').value;
    const password = document.getElementById('password').value;
    const btn = document.querySelector('.btn');

    // Basic validation
    if (!email || !password) {
        alert("Please fill in all fields");
        return;
    }

    // Disable button to prevent double-clicks
    btn.innerText = "Logging in...";
    btn.disabled = true;

    try {
        const response = await fetch('/api/user-login', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ email, password })
        });

        const data = await response.json();

        if (data.success) {
            localStorage.setItem("userToken", data.token);
            localStorage.setItem("userName", data.userName);
            window.location.href = "search.html";
        } else {
            alert("Login failed: " + data.error);
        }
    } catch (err) {
        console.error(err);
        alert("Server error. Is your backend running?");
    } finally {
        // Reset button if login fails
        btn.innerText = "Login";
        btn.disabled = false;
    }
}  
    </script>
</body>
</html>
