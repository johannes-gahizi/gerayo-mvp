<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Gerayo | Reset Password</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --primary: #16a34a;
      --dark: #0f172a;
      --text: #1e293b;
      --muted: #64748b;
      --border: #e2e8f0;
      --bg: #f8fafc;
      --white: #ffffff;
    }
    body { font-family: 'Inter', sans-serif; background: linear-gradient(135deg, #f8fafc 0%, #e2e8f0 100%); margin: 0; display:flex; justify-content:center; align-items:center; min-height:100vh; padding:24px; }
    .card { background: var(--white); width:100%; max-width:420px; border-radius:24px; padding:32px; box-shadow:0 20px 25px -5px rgba(0,0,0,.1); border:1px solid var(--border); }
    h2 { margin:0 0 8px; color:var(--dark); font-size:1.6rem; }
    p { margin:0 0 24px; color:var(--muted); line-height:1.5; }
    label { display:block; font-size:.8rem; font-weight:700; color:var(--dark); text-transform:uppercase; letter-spacing:.04em; margin-bottom:8px; }
    input { width:100%; padding:14px 16px; border:1px solid var(--border); border-radius:12px; box-sizing:border-box; margin-bottom:16px; font-size:1rem; }
    button { width:100%; padding:14px 16px; border:none; border-radius:12px; background:var(--primary); color:white; font-weight:700; cursor:pointer; }
    button:hover { opacity:.95; }
    .message { margin-top:14px; font-size:.9rem; color:var(--muted); }
  </style>
</head>
<body>
  <div class="card">
    <h2>Create a new password</h2>
    <p>Choose a strong password for your Gerayo account.</p>
    <p id="helperText" style="margin-bottom: 16px; color:#16a34a; font-weight:600;">You can now set a new password for your account.</p>
    <label for="password">New password</label>
    <input id="password" type="password" placeholder="At least 8 characters" />
    <label for="confirmPassword">Confirm password</label>
    <input id="confirmPassword" type="password" placeholder="Re-enter password" />
    <button onclick="submitReset()">Save new password</button>
    <div id="message" class="message"></div>
  </div>

  <script>
    const params = new URLSearchParams(window.location.search);
    const token = params.get('token');

    async function submitReset() {
      const password = document.getElementById('password').value;
      const confirmPassword = document.getElementById('confirmPassword').value;
      const messageBox = document.getElementById('message');

      if (!token) {
        messageBox.textContent = 'This reset link is missing a token.';
        return;
      }

      if (!password || !confirmPassword) {
        messageBox.textContent = 'Please complete both password fields.';
        return;
      }

      if (password.length < 8) {
        messageBox.textContent = 'Use at least 8 characters.';
        return;
      }

      if (password !== confirmPassword) {
        messageBox.textContent = 'Passwords do not match.';
        return;
      }

      try {
        const res = await fetch('/api/user/reset-password', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ token, password, confirmPassword })
        });

        const data = await res.json();
        messageBox.textContent = data.message || data.error || 'Password reset failed.';

        if (data.success) {
          localStorage.setItem('resetEmail', '');
          setTimeout(() => window.location.href = 'user-login.html', 1500);
        }
      } catch (err) {
        messageBox.textContent = 'Could not reset password right now.';
      }
    }
  </script>
</body>
</html>
